<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 报告 (Reports / Court Scribe) -->
  <!-- Background aura -->
  <g id="aura">
    <circle cx="100" cy="105" r="85" fill="#722F37" opacity="0.08"/>
    <circle cx="100" cy="105" r="70" fill="#B5485D" opacity="0.06"/>
  </g>

  <!-- Unfurling scrolls around character -->
  <g id="scrolls-background" opacity="0.4">
    <!-- Scroll left -->
    <path d="M25,75 Q20,80 22,100 Q24,110 28,115" fill="none" stroke="#D4A574" stroke-width="2"/>
    <rect x="18" y="72" width="14" height="5" rx="2.5" fill="#D4A574" stroke="#B8860B" stroke-width="1"/>
    <rect x="23" y="80" width="8" height="30" rx="0.5" fill="#FFF8DC" stroke="none" opacity="0.6"/>
    <line x1="25" y1="85" x2="29" y2="85" stroke="#8B7355" stroke-width="0.6"/>
    <line x1="25" y1="89" x2="29" y2="89" stroke="#8B7355" stroke-width="0.6"/>
    <line x1="25" y1="93" x2="29" y2="93" stroke="#8B7355" stroke-width="0.6"/>
    <!-- Scroll right -->
    <path d="M170,80 Q175,85 174,100 Q172,108 168,112" fill="none" stroke="#D4A574" stroke-width="2"/>
    <rect x="164" y="76" width="14" height="5" rx="2.5" fill="#D4A574" stroke="#B8860B" stroke-width="1"/>
    <rect x="167" y="84" width="7" height="24" rx="0.5" fill="#FFF8DC" stroke="none" opacity="0.6"/>
    <line x1="169" y1="88" x2="172" y2="88" stroke="#8B7355" stroke-width="0.6"/>
    <line x1="169" y1="92" x2="172" y2="92" stroke="#8B7355" stroke-width="0.6"/>
    <line x1="169" y1="96" x2="172" y2="96" stroke="#8B7355" stroke-width="0.6"/>
  </g>

  <!-- Body -->
  <g id="body">
    <!-- Robe base -->
    <path d="M62,112 Q58,138 54,168 L68,172 Q82,154 100,152 Q118,154 132,172 L146,168 Q142,138 138,112 Z" fill="#722F37" stroke="#5A2530" stroke-width="2"/>
    <!-- Inner panel -->
    <path d="M86,112 L84,152 Q100,149 116,152 L114,112 Z" fill="#B5485D" stroke="#9A3D50" stroke-width="1"/>
    <!-- Collar left -->
    <path d="M80,96 L72,116 L92,114 Z" fill="#B5485D" stroke="#9A3D50" stroke-width="1.5"/>
    <!-- Collar right -->
    <path d="M120,96 L128,116 L108,114 Z" fill="#B5485D" stroke="#9A3D50" stroke-width="1.5"/>
    <!-- Belt -->
    <rect x="70" y="130" width="60" height="5" rx="2.5" fill="#D4A574" stroke="#B8860B" stroke-width="1"/>
    <!-- Ink brush symbol on belt -->
    <line x1="98" y1="130" x2="98" y2="135" stroke="#5A2530" stroke-width="1.5"/>
    <circle cx="98" cy="130" r="1.5" fill="#5A2530"/>
    <line x1="102" y1="130" x2="102" y2="135" stroke="#5A2530" stroke-width="1"/>
    <!-- Scroll pattern trim -->
    <path d="M68,140 Q72,138 76,140 Q72,142 68,140 Z" fill="none" stroke="#B5485D" stroke-width="0.8" opacity="0.4"/>
    <path d="M124,140 Q128,138 132,140 Q128,142 124,140 Z" fill="none" stroke="#B5485D" stroke-width="0.8" opacity="0.4"/>
    <!-- Left sleeve -->
    <path d="M62,112 Q46,122 38,136 Q40,142 46,139 Q52,130 66,122 Z" fill="#722F37" stroke="#5A2530" stroke-width="2"/>
    <path d="M38,136 Q36,140 40,142 L46,139 Z" fill="#B5485D" stroke="#9A3D50" stroke-width="1"/>
    <!-- Right sleeve (actively writing) -->
    <path d="M138,112 Q150,118 156,128 Q154,134 148,131 Q145,125 136,120 Z" fill="#722F37" stroke="#5A2530" stroke-width="2"/>
    <path d="M156,128 Q158,132 154,134 L148,131 Z" fill="#B5485D" stroke="#9A3D50" stroke-width="1"/>
    <!-- Feet -->
    <ellipse cx="84" cy="172" rx="11" ry="5" fill="#2C1810" stroke="#1A0F09" stroke-width="1.5"/>
    <ellipse cx="116" cy="172" rx="11" ry="5" fill="#2C1810" stroke="#1A0F09" stroke-width="1.5"/>
  </g>

  <!-- Writing desk / main scroll (in front of character) -->
  <g id="writing-desk">
    <!-- Main scroll being written -->
    <rect x="56" y="148" width="50" height="28" rx="1" fill="#FFF8DC" stroke="#D4A574" stroke-width="1.5"/>
    <!-- Scroll roller top -->
    <rect x="54" y="146" width="54" height="4" rx="2" fill="#D4A574" stroke="#B8860B" stroke-width="1"/>
    <!-- Writing on scroll -->
    <line x1="62" y1="155" x2="98" y2="155" stroke="#3D2B1F" stroke-width="1" opacity="0.6"/>
    <line x1="62" y1="160" x2="100" y2="160" stroke="#3D2B1F" stroke-width="1" opacity="0.6"/>
    <line x1="62" y1="165" x2="95" y2="165" stroke="#3D2B1F" stroke-width="1" opacity="0.6"/>
    <line x1="62" y1="170" x2="80" y2="170" stroke="#3D2B1F" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Active brush pen (right hand writing) -->
  <g id="brush-pen">
    <!-- Hand -->
    <circle cx="152" cy="132" r="5" fill="#F5D0A9" stroke="#D4A574" stroke-width="1"/>
    <!-- Brush -->
    <line x1="150" y1="128" x2="142" y2="148" stroke="#5C3317" stroke-width="3" stroke-linecap="round"/>
    <!-- Brush tip with ink -->
    <path d="M142,148 L140,154 L144,154 Z" fill="#1A1A1A"/>
    <!-- Ink drop -->
    <circle cx="142" cy="156" r="1.5" fill="#1A1A1A" opacity="0.5"/>
  </g>

  <!-- Left hand (holding scroll edge) -->
  <g id="left-hand">
    <circle cx="42" cy="140" r="5" fill="#F5D0A9" stroke="#D4A574" stroke-width="1"/>
  </g>

  <!-- Head -->
  <g id="head">
    <!-- Neck -->
    <rect x="92" y="88" width="16" height="10" rx="3" fill="#F5D0A9" stroke="#D4A574" stroke-width="1"/>
    <!-- Face -->
    <ellipse cx="100" cy="70" rx="27" ry="28" fill="#F5D0A9" stroke="#D4A574" stroke-width="2"/>
    <!-- Ears -->
    <ellipse cx="73" cy="72" rx="5" ry="7" fill="#F5D0A9" stroke="#D4A574" stroke-width="1.5"/>
    <ellipse cx="127" cy="72" rx="5" ry="7" fill="#F5D0A9" stroke="#D4A574" stroke-width="1.5"/>

    <!-- Hair -->
    <g id="hair">
      <path d="M74,56 Q76,38 100,34 Q124,38 126,56" fill="#2C1810" stroke="#1A0F09" stroke-width="1.5"/>
      <!-- Scholar's cap -->
      <path d="M76,50 Q78,36 100,32 Q122,36 124,50" fill="#1A1A2E" stroke="#0D0D1A" stroke-width="1.5"/>
      <rect x="76" y="48" width="48" height="4" rx="1.5" fill="#222240" stroke="#1A1A30" stroke-width="1"/>
      <!-- Ruby ornament -->
      <circle cx="100" cy="40" r="3.5" fill="#B5485D" stroke="#722F37" stroke-width="1"/>
      <circle cx="99" cy="39" r="1.2" fill="white" opacity="0.35"/>
    </g>

    <!-- Composed, focused eyebrows -->
    <path d="M82,62 Q88,59 94,62" fill="none" stroke="#3D2B1F" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M106,62 Q112,59 118,62" fill="none" stroke="#3D2B1F" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Focused, downward-looking eyes (writing) -->
    <g id="eyes">
      <ellipse cx="88" cy="69" rx="5.5" ry="5.5" fill="white" stroke="#3D2B1F" stroke-width="1.5"/>
      <ellipse cx="88" cy="70" rx="3.5" ry="4" fill="#3D2B1F"/>
      <circle cx="87" cy="68" r="1.5" fill="white" opacity="0.8"/>
      <!-- Looking down slightly -->
      <path d="M82.5,66 Q88,64 93.5,66" fill="#F5D0A9" stroke="none"/>
      <ellipse cx="112" cy="69" rx="5.5" ry="5.5" fill="white" stroke="#3D2B1F" stroke-width="1.5"/>
      <ellipse cx="112" cy="70" rx="3.5" ry="4" fill="#3D2B1F"/>
      <circle cx="111" cy="68" r="1.5" fill="white" opacity="0.8"/>
      <path d="M106.5,66 Q112,64 117.5,66" fill="#F5D0A9" stroke="none"/>
    </g>

    <!-- Nose -->
    <path d="M98,76 Q100,79 102,76" fill="none" stroke="#C4956A" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Composed, slight focus-smile -->
    <path d="M93,83 Q97,85 100,85 Q103,85 107,83" fill="none" stroke="#C4956A" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Subtle blush -->
    <ellipse cx="80" cy="79" rx="4" ry="3" fill="#FFB6C1" opacity="0.25"/>
    <ellipse cx="120" cy="79" rx="4" ry="3" fill="#FFB6C1" opacity="0.25"/>
  </g>

  <!-- Ink pot (detail) -->
  <g id="ink-pot" opacity="0.6">
    <circle cx="120" cy="160" r="5" fill="#1A1A1A" stroke="#333" stroke-width="1"/>
    <ellipse cx="120" cy="158" rx="5" ry="2" fill="#2A2A2A" stroke="#333" stroke-width="0.5"/>
    <circle cx="119" cy="158" r="1" fill="#444" opacity="0.5"/>
  </g>
</svg>