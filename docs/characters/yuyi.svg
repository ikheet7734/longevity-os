<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 御医 (Imperial Physician / Orchestrator) -->
  <!-- Background aura -->
  <g id="aura">
    <circle cx="100" cy="105" r="85" fill="#C41E3A" opacity="0.08"/>
    <circle cx="100" cy="105" r="70" fill="#FFD700" opacity="0.06"/>
  </g>

  <!-- Body -->
  <g id="body">
    <!-- Robe base -->
    <path d="M60,110 Q58,130 52,165 L65,170 Q80,150 100,148 Q120,150 135,170 L148,165 Q142,130 140,110 Z" fill="#C41E3A" stroke="#8B1225" stroke-width="2"/>
    <!-- Robe inner panel -->
    <path d="M85,110 L82,148 Q100,145 118,148 L115,110 Z" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
    <!-- Robe collar left -->
    <path d="M78,95 L70,115 L90,112 Z" fill="#FFD700" stroke="#DAA520" stroke-width="1.5"/>
    <!-- Robe collar right -->
    <path d="M122,95 L130,115 L110,112 Z" fill="#FFD700" stroke="#DAA520" stroke-width="1.5"/>
    <!-- Belt/sash -->
    <rect x="68" y="128" width="64" height="6" rx="3" fill="#DAA520" stroke="#B8860B" stroke-width="1"/>
    <circle cx="100" cy="131" r="4" fill="#FFD700" stroke="#B8860B" stroke-width="1"/>
    <!-- Sleeves left -->
    <path d="M60,110 Q45,120 38,135 Q40,140 48,138 Q55,128 65,122 Z" fill="#C41E3A" stroke="#8B1225" stroke-width="2"/>
    <path d="M38,135 Q36,138 40,140 L48,138 Z" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
    <!-- Sleeves right -->
    <path d="M140,110 Q155,120 162,135 Q160,140 152,138 Q145,128 135,122 Z" fill="#C41E3A" stroke="#8B1225" stroke-width="2"/>
    <path d="M162,135 Q164,138 160,140 L152,138 Z" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
    <!-- Gold trim lines on robe -->
    <path d="M65,140 Q80,138 100,137 Q120,138 135,140" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.5"/>
    <path d="M62,155 Q80,152 100,151 Q120,152 138,155" fill="none" stroke="#FFD700" stroke-width="1" opacity="0.5"/>
    <!-- Feet -->
    <ellipse cx="82" cy="170" rx="12" ry="5" fill="#2C1810" stroke="#1A0F09" stroke-width="1.5"/>
    <ellipse cx="118" cy="170" rx="12" ry="5" fill="#2C1810" stroke="#1A0F09" stroke-width="1.5"/>
  </g>

  <!-- Ruyi scepter (right hand) -->
  <g id="ruyi">
    <path d="M152,132 L158,108 Q162,100 158,96 Q154,92 150,96 Q146,100 150,106 L148,132" fill="#7EC8A0" stroke="#2E8B57" stroke-width="1.5"/>
    <ellipse cx="155" cy="96" rx="8" ry="6" fill="#7EC8A0" stroke="#2E8B57" stroke-width="1.5"/>
    <path d="M149,94 Q155,88 161,94" fill="none" stroke="#2E8B57" stroke-width="1" opacity="0.6"/>
    <!-- Jade shine -->
    <ellipse cx="153" cy="94" rx="2" ry="1.5" fill="white" opacity="0.4"/>
  </g>

  <!-- Head -->
  <g id="head">
    <!-- Neck -->
    <rect x="92" y="88" width="16" height="10" rx="3" fill="#F5D0A9" stroke="#D4A574" stroke-width="1"/>
    <!-- Face shape -->
    <ellipse cx="100" cy="72" rx="28" ry="30" fill="#F5D0A9" stroke="#D4A574" stroke-width="2"/>
    <!-- Ears -->
    <ellipse cx="72" cy="74" rx="5" ry="7" fill="#F5D0A9" stroke="#D4A574" stroke-width="1.5"/>
    <ellipse cx="128" cy="74" rx="5" ry="7" fill="#F5D0A9" stroke="#D4A574" stroke-width="1.5"/>

    <!-- 乌纱帽 (Official's hat) -->
    <g id="hat">
      <!-- Hat body -->
      <path d="M70,58 Q72,38 100,34 Q128,38 130,58 Z" fill="#1A1A2E" stroke="#0D0D1A" stroke-width="2"/>
      <!-- Hat top ridge -->
      <path d="M80,42 Q100,36 120,42" fill="none" stroke="#333" stroke-width="1.5"/>
      <!-- Hat wings -->
      <path d="M70,52 Q55,48 45,52 Q44,54 46,56 Q56,54 70,56" fill="#1A1A2E" stroke="#0D0D1A" stroke-width="1.5"/>
      <path d="M130,52 Q145,48 155,52 Q156,54 154,56 Q144,54 130,56" fill="#1A1A2E" stroke="#0D0D1A" stroke-width="1.5"/>
      <!-- Gold ornament on hat -->
      <circle cx="100" cy="42" r="4" fill="#FFD700" stroke="#DAA520" stroke-width="1"/>
      <circle cx="100" cy="42" r="2" fill="#FF6347" stroke="#CC4030" stroke-width="0.5"/>
    </g>

    <!-- Eyebrows -->
    <path d="M82,64 Q88,60 94,63" fill="none" stroke="#3D2B1F" stroke-width="2" stroke-linecap="round"/>
    <path d="M106,63 Q112,60 118,64" fill="none" stroke="#3D2B1F" stroke-width="2" stroke-linecap="round"/>

    <!-- Eyes (big chibi eyes) -->
    <g id="eyes">
      <ellipse cx="88" cy="70" rx="6" ry="7" fill="white" stroke="#3D2B1F" stroke-width="1.5"/>
      <ellipse cx="88" cy="71" rx="4" ry="5" fill="#3D2B1F"/>
      <circle cx="86" cy="69" r="2" fill="white" opacity="0.9"/>
      <ellipse cx="112" cy="70" rx="6" ry="7" fill="white" stroke="#3D2B1F" stroke-width="1.5"/>
      <ellipse cx="112" cy="71" rx="4" ry="5" fill="#3D2B1F"/>
      <circle cx="110" cy="69" r="2" fill="white" opacity="0.9"/>
    </g>

    <!-- Nose -->
    <path d="M98,76 Q100,79 102,76" fill="none" stroke="#C4956A" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Gentle smile -->
    <path d="M90,83 Q95,88 100,88 Q105,88 110,83" fill="none" stroke="#C4956A" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Cheek blush -->
    <ellipse cx="80" cy="80" rx="5" ry="3" fill="#FFB6C1" opacity="0.4"/>
    <ellipse cx="120" cy="80" rx="5" ry="3" fill="#FFB6C1" opacity="0.4"/>

    <!-- Small beard -->
    <path d="M94,90 Q97,95 100,96 Q103,95 106,90" fill="none" stroke="#5C4033" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M96,92 Q100,98 104,92" fill="none" stroke="#5C4033" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- Left hand -->
  <g id="left-hand">
    <circle cx="42" cy="137" r="5" fill="#F5D0A9" stroke="#D4A574" stroke-width="1"/>
  </g>

  <!-- Sparkle effects -->
  <g id="sparkles" opacity="0.6">
    <path d="M35,70 L37,65 L39,70 L37,75 Z" fill="#FFD700"/>
    <path d="M160,75 L162,70 L164,75 L162,80 Z" fill="#FFD700"/>
    <path d="M45,95 L46,92 L47,95 L46,98 Z" fill="#FFD700"/>
  </g>
</svg>