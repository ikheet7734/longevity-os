<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 验方科 (Labs/Biomarkers / Alchemist) -->
  <!-- Background aura -->
  <g id="aura">
    <circle cx="100" cy="105" r="85" fill="#1E3A5F" opacity="0.08"/>
    <circle cx="100" cy="105" r="70" fill="#4A90D9" opacity="0.06"/>
  </g>

  <!-- Body -->
  <g id="body">
    <!-- Robe base -->
    <path d="M62,112 Q58,138 54,168 L68,172 Q82,154 100,152 Q118,154 132,172 L146,168 Q142,138 138,112 Z" fill="#1E3A5F" stroke="#152D4A" stroke-width="2"/>
    <!-- Inner panel -->
    <path d="M86,112 L84,152 Q100,149 116,152 L114,112 Z" fill="#2B5088" stroke="#244578" stroke-width="1"/>
    <!-- Collar left -->
    <path d="M80,96 L72,116 L92,114 Z" fill="#4A90D9" stroke="#3A80C0" stroke-width="1.5"/>
    <!-- Collar right -->
    <path d="M120,96 L128,116 L108,114 Z" fill="#4A90D9" stroke="#3A80C0" stroke-width="1.5"/>
    <!-- Belt -->
    <rect x="70" y="130" width="60" height="5" rx="2.5" fill="#4A90D9" stroke="#3A80C0" stroke-width="1"/>
    <!-- Alchemical symbol on belt -->
    <circle cx="100" cy="132.5" r="3.5" fill="none" stroke="#87CEEB" stroke-width="1"/>
    <path d="M97,132.5 L103,132.5 M100,130 L100,135" fill="none" stroke="#87CEEB" stroke-width="0.8"/>
    <!-- Left sleeve (holding up vial) -->
    <path d="M62,112 Q44,108 32,98 Q30,102 34,106 Q42,114 60,118 Z" fill="#1E3A5F" stroke="#152D4A" stroke-width="2"/>
    <path d="M32,98 Q28,100 30,104 L36,106 Z" fill="#4A90D9" stroke="#3A80C0" stroke-width="1"/>
    <!-- Right sleeve -->
    <path d="M138,112 Q154,122 162,136 Q160,142 154,139 Q148,130 136,122 Z" fill="#1E3A5F" stroke="#152D4A" stroke-width="2"/>
    <path d="M162,136 Q164,140 160,142 L154,139 Z" fill="#4A90D9" stroke="#3A80C0" stroke-width="1"/>
    <!-- Star pattern on robe -->
    <circle cx="76" cy="148" r="1.5" fill="#4A90D9" opacity="0.4"/>
    <circle cx="124" cy="145" r="1.5" fill="#4A90D9" opacity="0.4"/>
    <circle cx="90" cy="160" r="1" fill="#4A90D9" opacity="0.3"/>
    <circle cx="110" cy="158" r="1" fill="#4A90D9" opacity="0.3"/>
    <!-- Feet -->
    <ellipse cx="84" cy="172" rx="11" ry="5" fill="#2C1810" stroke="#1A0F09" stroke-width="1.5"/>
    <ellipse cx="116" cy="172" rx="11" ry="5" fill="#2C1810" stroke="#1A0F09" stroke-width="1.5"/>
  </g>

  <!-- Glowing vial (left hand, held up) -->
  <g id="vial-main">
    <!-- Hand holding vial -->
    <circle cx="30" cy="96" r="5" fill="#F5D0A9" stroke="#D4A574" stroke-width="1"/>
    <!-- Vial -->
    <rect x="24" y="72" width="12" height="22" rx="4" fill="#B8D4E3" stroke="#6BAACC" stroke-width="1.5" opacity="0.8"/>
    <rect x="26" y="68" width="8" height="6" rx="1" fill="#888" stroke="#666" stroke-width="1"/>
    <!-- Cork -->
    <rect x="27" y="66" width="6" height="4" rx="2" fill="#D4A574" stroke="#B8860B" stroke-width="0.5"/>
    <!-- Liquid inside -->
    <rect x="26" y="80" width="8" height="12" rx="3" fill="#4AE0A0" opacity="0.7"/>
    <!-- Glow effect -->
    <circle cx="30" cy="85" r="12" fill="#4AE0A0" opacity="0.15"/>
    <circle cx="30" cy="85" r="8" fill="#4AE0A0" opacity="0.1"/>
    <!-- Bubbles in vial -->
    <circle cx="28" cy="84" r="1.5" fill="white" opacity="0.6"/>
    <circle cx="32" cy="80" r="1" fill="white" opacity="0.5"/>
    <circle cx="29" cy="88" r="1" fill="white" opacity="0.4"/>
  </g>

  <!-- Surrounding lab equipment -->
  <g id="lab-equipment" opacity="0.6">
    <!-- Test tube rack (right side) -->
    <rect x="152" y="108" width="20" height="4" rx="1" fill="#8B5E3C" stroke="#6B4226" stroke-width="1"/>
    <!-- Test tubes -->
    <rect x="155" y="98" width="4" height="14" rx="2" fill="#B8D4E3" stroke="#6BAACC" stroke-width="0.8" opacity="0.7"/>
    <rect x="157" y="104" width="2" height="7" rx="1" fill="#FF6B6B" opacity="0.5"/>
    <rect x="161" y="100" width="4" height="12" rx="2" fill="#B8D4E3" stroke="#6BAACC" stroke-width="0.8" opacity="0.7"/>
    <rect x="163" y="104" width="2" height="7" rx="1" fill="#4A90D9" opacity="0.5"/>
    <rect x="167" y="96" width="4" height="16" rx="2" fill="#B8D4E3" stroke="#6BAACC" stroke-width="0.8" opacity="0.7"/>
    <rect x="169" y="102" width="2" height="9" rx="1" fill="#4AE0A0" opacity="0.5"/>

    <!-- Traditional medicine bottle (药瓶) -->
    <path d="M148,140 Q146,130 150,126 L156,126 Q160,130 158,140 Z" fill="#DEB887" stroke="#B8860B" stroke-width="1"/>
    <rect x="149" y="122" width="8" height="5" rx="1" fill="#B8860B" stroke="#8B6914" stroke-width="0.5"/>
    <!-- Label on bottle -->
    <rect x="150" y="132" width="6" height="4" rx="0.5" fill="#FFF8DC" stroke="#D4A574" stroke-width="0.5"/>
  </g>

  <!-- Floating bubbles/particles -->
  <g id="particles" opacity="0.4">
    <circle cx="45" cy="68" r="2" fill="#4AE0A0"/>
    <circle cx="20" cy="75" r="1.5" fill="#4A90D9"/>
    <circle cx="38" cy="58" r="1.5" fill="#87CEEB"/>
    <circle cx="15" cy="88" r="1" fill="#4AE0A0"/>
    <circle cx="42" cy="82" r="1" fill="#4A90D9"/>
  </g>

  <!-- Head -->
  <g id="head">
    <!-- Neck -->
    <rect x="92" y="88" width="16" height="10" rx="3" fill="#F5D0A9" stroke="#D4A574" stroke-width="1"/>
    <!-- Face -->
    <ellipse cx="100" cy="70" rx="27" ry="28" fill="#F5D0A9" stroke="#D4A574" stroke-width="2"/>
    <!-- Ears -->
    <ellipse cx="73" cy="72" rx="5" ry="7" fill="#F5D0A9" stroke="#D4A574" stroke-width="1.5"/>
    <ellipse cx="127" cy="72" rx="5" ry="7" fill="#F5D0A9" stroke="#D4A574" stroke-width="1.5"/>

    <!-- Hair -->
    <g id="hair">
      <path d="M74,56 Q76,38 100,34 Q124,38 126,56" fill="#2C1810" stroke="#1A0F09" stroke-width="1.5"/>
      <!-- Scholar cap -->
      <path d="M76,50 Q78,36 100,32 Q122,36 124,50" fill="#1E3A5F" stroke="#152D4A" stroke-width="1.5"/>
      <rect x="76" y="48" width="48" height="4" rx="1.5" fill="#2B5088" stroke="#1E3A5F" stroke-width="1"/>
      <!-- Moon symbol on cap -->
      <path d="M98,40 Q94,36 98,32 Q104,36 100,40" fill="none" stroke="#87CEEB" stroke-width="1"/>
    </g>

    <!-- Curious raised eyebrows -->
    <path d="M82,59 Q88,54 94,59" fill="none" stroke="#3D2B1F" stroke-width="2" stroke-linecap="round"/>
    <path d="M106,59 Q112,54 118,59" fill="none" stroke="#3D2B1F" stroke-width="2" stroke-linecap="round"/>

    <!-- Wide, curious eyes -->
    <g id="eyes">
      <ellipse cx="88" cy="67" rx="6" ry="7" fill="white" stroke="#3D2B1F" stroke-width="1.5"/>
      <ellipse cx="88" cy="68" rx="4" ry="5" fill="#3D2B1F"/>
      <circle cx="86" cy="66" r="2" fill="white" opacity="0.9"/>
      <circle cx="90" cy="70" r="1" fill="white" opacity="0.5"/>
      <ellipse cx="112" cy="67" rx="6" ry="7" fill="white" stroke="#3D2B1F" stroke-width="1.5"/>
      <ellipse cx="112" cy="68" rx="4" ry="5" fill="#3D2B1F"/>
      <circle cx="110" cy="66" r="2" fill="white" opacity="0.9"/>
      <circle cx="114" cy="70" r="1" fill="white" opacity="0.5"/>
    </g>

    <!-- Nose -->
    <path d="M98,76 Q100,79 102,76" fill="none" stroke="#C4956A" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Curious 'ooh' mouth -->
    <ellipse cx="100" cy="85" rx="4" ry="3" fill="#CC8888" stroke="#C4956A" stroke-width="1.5"/>

    <!-- Cheek blush -->
    <ellipse cx="79" cy="78" rx="4" ry="3" fill="#FFB6C1" opacity="0.3"/>
    <ellipse cx="121" cy="78" rx="4" ry="3" fill="#FFB6C1" opacity="0.3"/>
  </g>

  <!-- Right hand -->
  <g id="right-hand">
    <circle cx="158" cy="140" r="5" fill="#F5D0A9" stroke="#D4A574" stroke-width="1"/>
  </g>
</svg>