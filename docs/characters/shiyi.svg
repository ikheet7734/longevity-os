<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 食医科 (Diet / Chef-Doctor) -->
  <!-- Background aura -->
  <g id="aura">
    <circle cx="100" cy="105" r="85" fill="#E8751A" opacity="0.08"/>
    <circle cx="100" cy="105" r="70" fill="#F5A623" opacity="0.06"/>
  </g>

  <!-- Body -->
  <g id="body">
    <!-- Robe base -->
    <path d="M62,114 Q58,138 54,168 L68,172 Q82,154 100,152 Q118,154 132,172 L146,168 Q142,138 138,114 Z" fill="#E8751A" stroke="#C4600E" stroke-width="2"/>
    <!-- Inner robe -->
    <path d="M86,114 L84,152 Q100,149 116,152 L114,114 Z" fill="#F5A623" stroke="#D49020" stroke-width="1"/>
    <!-- Collar left -->
    <path d="M80,98 L72,118 L92,116 Z" fill="#F5A623" stroke="#D49020" stroke-width="1.5"/>
    <!-- Collar right -->
    <path d="M120,98 L128,118 L108,116 Z" fill="#F5A623" stroke="#D49020" stroke-width="1.5"/>
    <!-- Apron -->
    <path d="M76,126 L76,168 Q100,172 124,168 L124,126 Z" fill="#FFF8DC" stroke="#D4A574" stroke-width="1.5"/>
    <!-- Apron string -->
    <path d="M76,126 Q88,124 100,126 Q112,124 124,126" fill="none" stroke="#D4A574" stroke-width="1.5"/>
    <!-- Apron pocket -->
    <rect x="90" y="142" width="20" height="14" rx="2" fill="none" stroke="#D4A574" stroke-width="1" opacity="0.6"/>
    <!-- Left sleeve -->
    <path d="M62,114 Q46,124 38,138 Q40,143 46,141 Q52,132 66,124 Z" fill="#E8751A" stroke="#C4600E" stroke-width="2"/>
    <path d="M38,138 Q36,141 40,143 L46,141 Z" fill="#F5A623" stroke="#D49020" stroke-width="1"/>
    <!-- Right sleeve -->
    <path d="M138,114 Q154,124 162,138 Q160,143 154,141 Q148,132 134,124 Z" fill="#E8751A" stroke="#C4600E" stroke-width="2"/>
    <path d="M162,138 Q164,141 160,143 L154,141 Z" fill="#F5A623" stroke="#D49020" stroke-width="1"/>
    <!-- Feet -->
    <ellipse cx="84" cy="172" rx="11" ry="5" fill="#2C1810" stroke="#1A0F09" stroke-width="1.5"/>
    <ellipse cx="116" cy="172" rx="11" ry="5" fill="#2C1810" stroke="#1A0F09" stroke-width="1.5"/>
  </g>

  <!-- Steaming bowl (left hand) -->
  <g id="bowl">
    <ellipse cx="36" cy="130" rx="18" ry="8" fill="#DEB887" stroke="#B8860B" stroke-width="1.5"/>
    <path d="M18,130 Q18,148 36,148 Q54,148 54,130" fill="#DEB887" stroke="#B8860B" stroke-width="1.5"/>
    <!-- Food in bowl -->
    <ellipse cx="36" cy="129" rx="14" ry="5" fill="#8FBC8F" stroke="#6B8E6B" stroke-width="1"/>
    <circle cx="32" cy="128" r="3" fill="#FF6347" stroke="#CC4030" stroke-width="0.5"/>
    <circle cx="40" cy="127" r="2" fill="#FFD700" stroke="#DAA520" stroke-width="0.5"/>
    <!-- Steam -->
    <path d="M28,120 Q26,112 30,108" fill="none" stroke="#DDD" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <path d="M36,118 Q34,108 38,104" fill="none" stroke="#DDD" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M44,120 Q42,112 46,108" fill="none" stroke="#DDD" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <!-- Left hand -->
    <path d="M28,132 Q24,128 20,132 Q18,136 24,138 L36,138 Q36,134 32,132 Z" fill="#F5D0A9" stroke="#D4A574" stroke-width="1"/>
  </g>

  <!-- Chopsticks (right hand) -->
  <g id="chopsticks">
    <line x1="158" y1="100" x2="168" y2="135" stroke="#8B5E3C" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="162" y1="100" x2="172" y2="135" stroke="#8B5E3C" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Right hand -->
    <circle cx="160" cy="140" r="5" fill="#F5D0A9" stroke="#D4A574" stroke-width="1"/>
  </g>

  <!-- Floating food items -->
  <g id="food-items" opacity="0.7">
    <!-- Fish -->
    <ellipse cx="155" cy="72" rx="8" ry="4" fill="#F08080" stroke="#E06060" stroke-width="1"/>
    <path d="M163,72 L168,68 L168,76 Z" fill="#F08080" stroke="#E06060" stroke-width="0.8"/>
    <!-- Rice grain -->
    <ellipse cx="48" cy="90" rx="4" ry="2" fill="white" stroke="#DDD" stroke-width="0.8" transform="rotate(-20,48,90)"/>
    <!-- Vegetable leaf -->
    <path d="M145,88 Q150,82 155,88 Q150,86 145,88 Z" fill="#4CAF50" stroke="#388E3C" stroke-width="0.8"/>
    <!-- Carrot -->
    <path d="M50,100 L46,108 L54,108 Z" fill="#FF8C00" stroke="#E07600" stroke-width="0.8"/>
    <path d="M48,100 Q50,96 52,100" fill="#4CAF50" stroke="none"/>
  </g>

  <!-- Head -->
  <g id="head">
    <!-- Neck -->
    <rect x="92" y="90" width="16" height="10" rx="3" fill="#F5D0A9" stroke="#D4A574" stroke-width="1"/>
    <!-- Face -->
    <ellipse cx="100" cy="72" rx="27" ry="28" fill="#F5D0A9" stroke="#D4A574" stroke-width="2"/>
    <!-- Ears -->
    <ellipse cx="73" cy="74" rx="5" ry="7" fill="#F5D0A9" stroke="#D4A574" stroke-width="1.5"/>
    <ellipse cx="127" cy="74" rx="5" ry="7" fill="#F5D0A9" stroke="#D4A574" stroke-width="1.5"/>

    <!-- Chef-style headband -->
    <g id="headband">
      <path d="M73,58 Q76,42 100,38 Q124,42 127,58" fill="none" stroke="none"/>
      <rect x="72" y="52" width="56" height="8" rx="3" fill="white" stroke="#D4A574" stroke-width="1.5"/>
      <!-- Knot on side -->
      <circle cx="130" cy="56" r="5" fill="white" stroke="#D4A574" stroke-width="1"/>
      <path d="M133" y1="52" x2="138" y2="48" fill="none" stroke="#D4A574" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M133,60 Q138,64 136,58" fill="none" stroke="#D4A574" stroke-width="1.5" stroke-linecap="round"/>
    </g>

    <!-- Hair -->
    <path d="M73,56 Q76,42 100,38 Q124,42 127,56" fill="#2C1810" stroke="#1A0F09" stroke-width="1"/>

    <!-- Eyebrows (happy, raised) -->
    <path d="M82,62 Q88,58 94,62" fill="none" stroke="#3D2B1F" stroke-width="2" stroke-linecap="round"/>
    <path d="M106,62 Q112,58 118,62" fill="none" stroke="#3D2B1F" stroke-width="2" stroke-linecap="round"/>

    <!-- Happy eyes (curved/squinting with joy) -->
    <g id="eyes">
      <path d="M82,70 Q88,64 94,70" fill="none" stroke="#3D2B1F" stroke-width="2.5" stroke-linecap="round"/>
      <path d="M106,70 Q112,64 118,70" fill="none" stroke="#3D2B1F" stroke-width="2.5" stroke-linecap="round"/>
    </g>

    <!-- Nose -->
    <path d="M98,77 Q100,80 102,77" fill="none" stroke="#C4956A" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Big happy open mouth smile -->
    <path d="M88,83 Q94,92 100,92 Q106,92 112,83" fill="#CC6666" stroke="#C4956A" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Teeth hint -->
    <path d="M92,84 L108,84" fill="none" stroke="white" stroke-width="1" opacity="0.8"/>
    <!-- Tongue -->
    <ellipse cx="100" cy="89" rx="5" ry="3" fill="#E88080" stroke="none"/>

    <!-- Cheek blush (extra rosy - happy!) -->
    <ellipse cx="78" cy="78" rx="6" ry="4" fill="#FFB6C1" opacity="0.5"/>
    <ellipse cx="122" cy="78" rx="6" ry="4" fill="#FFB6C1" opacity="0.5"/>
  </g>
</svg>