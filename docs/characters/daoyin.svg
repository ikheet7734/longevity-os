<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- 导引科 (Exercise / Daoyin / Tai Chi Master) -->
  <!-- Background aura -->
  <g id="aura">
    <circle cx="100" cy="105" r="85" fill="#00A86B" opacity="0.08"/>
    <circle cx="100" cy="105" r="70" fill="#2ECC71" opacity="0.06"/>
  </g>

  <!-- Qi energy lines -->
  <g id="qi-lines" opacity="0.3">
    <path d="M40,80 Q60,60 80,70" fill="none" stroke="#2ECC71" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M35,95 Q55,80 70,90" fill="none" stroke="#00A86B" stroke-width="1" stroke-linecap="round"/>
    <path d="M160,80 Q140,60 120,70" fill="none" stroke="#2ECC71" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M165,95 Q145,80 130,90" fill="none" stroke="#00A86B" stroke-width="1" stroke-linecap="round"/>
    <!-- Swirling qi around body -->
    <path d="M50,140 Q40,120 50,100" fill="none" stroke="#2ECC71" stroke-width="1" stroke-linecap="round"/>
    <path d="M150,140 Q160,120 150,100" fill="none" stroke="#2ECC71" stroke-width="1" stroke-linecap="round"/>
    <!-- Rising qi from feet -->
    <path d="M80,175 Q75,165 80,155" fill="none" stroke="#00A86B" stroke-width="1" opacity="0.4"/>
    <path d="M120,175 Q125,165 120,155" fill="none" stroke="#00A86B" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- Body (in tai chi pose - weight shifted) -->
  <g id="body">
    <!-- Robe base (flowing, dynamic) -->
    <path d="M65,112 Q55,138 48,170 L64,174 Q80,156 100,154 Q120,156 136,174 L152,170 Q145,138 135,112 Z" fill="white" stroke="#B0C4B0" stroke-width="2"/>
    <!-- Jade green sash/trim -->
    <path d="M70,112 Q68,120 66,130" fill="none" stroke="#00A86B" stroke-width="2"/>
    <path d="M130,112 Q132,120 134,130" fill="none" stroke="#00A86B" stroke-width="2"/>
    <!-- Inner panel -->
    <path d="M86,112 L84,154 Q100,151 116,154 L114,112 Z" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="1"/>
    <!-- Collar left -->
    <path d="M80,96 L72,116 L92,114 Z" fill="#00A86B" stroke="#008855" stroke-width="1.5"/>
    <!-- Collar right -->
    <path d="M120,96 L128,116 L108,114 Z" fill="#00A86B" stroke="#008855" stroke-width="1.5"/>
    <!-- Green belt/sash -->
    <path d="M68,128 Q100,124 132,128" fill="none" stroke="#00A86B" stroke-width="4" stroke-linecap="round"/>
    <!-- Sash tail hanging -->
    <path d="M120,128 Q125,140 118,155" fill="none" stroke="#00A86B" stroke-width="3" stroke-linecap="round"/>
    <path d="M118,155 Q116,158 120,158 Q122,156 118,155" fill="#00A86B"/>

    <!-- Left arm (extended forward in tai chi push) -->
    <path d="M65,112 Q42,108 28,115 Q26,120 32,120 Q40,118 60,118 Z" fill="white" stroke="#B0C4B0" stroke-width="2"/>
    <path d="M28,115 Q24,117 26,120 L32,120 Z" fill="#00A86B" stroke="#008855" stroke-width="1"/>
    <!-- Right arm (pulled back, palm facing) -->
    <path d="M135,112 Q152,118 160,130 Q158,136 152,133 Q148,126 136,120 Z" fill="white" stroke="#B0C4B0" stroke-width="2"/>
    <path d="M160,130 Q162,134 158,136 L152,133 Z" fill="#00A86B" stroke="#008855" stroke-width="1"/>

    <!-- Flowing robe motion lines -->
    <path d="M56,150 Q50,155 48,170" fill="none" stroke="#A5D6A7" stroke-width="1" opacity="0.5"/>
    <path d="M144,150 Q150,155 152,170" fill="none" stroke="#A5D6A7" stroke-width="1" opacity="0.5"/>

    <!-- Feet (one forward, one back - stance) -->
    <ellipse cx="78" cy="174" rx="13" ry="5" fill="#2C1810" stroke="#1A0F09" stroke-width="1.5"/>
    <ellipse cx="122" cy="172" rx="10" ry="4" fill="#2C1810" stroke="#1A0F09" stroke-width="1.5"/>
  </g>

  <!-- Hands (tai chi palms) -->
  <g id="hands">
    <!-- Left hand (push palm) -->
    <path d="M20,112 Q18,108 22,106 L30,106 Q34,108 32,112 L30,118 Q26,120 22,118 Z" fill="#F5D0A9" stroke="#D4A574" stroke-width="1.5"/>
    <!-- Fingers -->
    <line x1="22" y1="106" x2="21" y2="102" stroke="#D4A574" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="25" y1="106" x2="24" y2="101" stroke="#D4A574" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="28" y1="106" x2="28" y2="101" stroke="#D4A574" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Qi glow on palm -->
    <circle cx="26" cy="110" r="6" fill="#2ECC71" opacity="0.15"/>
    <!-- Right hand -->
    <circle cx="158" cy="133" r="5" fill="#F5D0A9" stroke="#D4A574" stroke-width="1"/>
  </g>

  <!-- Head -->
  <g id="head">
    <!-- Neck -->
    <rect x="92" y="88" width="16" height="10" rx="3" fill="#F5D0A9" stroke="#D4A574" stroke-width="1"/>
    <!-- Face (slightly more angular/strong) -->
    <ellipse cx="100" cy="70" rx="26" ry="27" fill="#F5D0A9" stroke="#D4A574" stroke-width="2"/>
    <!-- Ears -->
    <ellipse cx="74" cy="72" rx="5" ry="7" fill="#F5D0A9" stroke="#D4A574" stroke-width="1.5"/>
    <ellipse cx="126" cy="72" rx="5" ry="7" fill="#F5D0A9" stroke="#D4A574" stroke-width="1.5"/>

    <!-- Hair (tied up in a bun - martial arts style) -->
    <g id="hair">
      <path d="M74,56 Q76,38 100,34 Q124,38 126,56" fill="#2C1810" stroke="#1A0F09" stroke-width="1.5"/>
      <!-- Top knot bun -->
      <circle cx="100" cy="30" r="10" fill="#2C1810" stroke="#1A0F09" stroke-width="1.5"/>
      <!-- Jade hairpin -->
      <line x1="88" y1="28" x2="112" y2="32" stroke="#00A86B" stroke-width="2.5" stroke-linecap="round"/>
      <circle cx="88" cy="28" r="3" fill="#2ECC71" stroke="#00A86B" stroke-width="1"/>
      <circle cx="87" cy="27" r="1" fill="white" opacity="0.5"/>
    </g>

    <!-- Determined eyebrows -->
    <path d="M82,60 Q88,56 94,60" fill="none" stroke="#3D2B1F" stroke-width="2" stroke-linecap="round"/>
    <path d="M106,60 Q112,56 118,60" fill="none" stroke="#3D2B1F" stroke-width="2" stroke-linecap="round"/>

    <!-- Focused eyes -->
    <g id="eyes">
      <ellipse cx="88" cy="67" rx="5.5" ry="6" fill="white" stroke="#3D2B1F" stroke-width="1.5"/>
      <ellipse cx="88" cy="68" rx="3.5" ry="4.5" fill="#3D2B1F"/>
      <circle cx="87" cy="66" r="1.8" fill="white" opacity="0.8"/>
      <ellipse cx="112" cy="67" rx="5.5" ry="6" fill="white" stroke="#3D2B1F" stroke-width="1.5"/>
      <ellipse cx="112" cy="68" rx="3.5" ry="4.5" fill="#3D2B1F"/>
      <circle cx="111" cy="66" r="1.8" fill="white" opacity="0.8"/>
    </g>

    <!-- Nose -->
    <path d="M98,74 Q100,77 102,74" fill="none" stroke="#C4956A" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Determined, focused slight smile -->
    <path d="M93,82 Q97,85 100,85 Q103,85 107,82" fill="none" stroke="#C4956A" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Light blush -->
    <ellipse cx="80" cy="77" rx="4" ry="3" fill="#FFB6C1" opacity="0.3"/>
    <ellipse cx="120" cy="77" rx="4" ry="3" fill="#FFB6C1" opacity="0.3"/>
  </g>

  <!-- Motion/energy sparkles -->
  <g id="energy-sparkles" opacity="0.5">
    <circle cx="30" cy="98" r="2" fill="#2ECC71"/>
    <circle cx="22" cy="105" r="1.5" fill="#00A86B"/>
    <circle cx="170" cy="125" r="1.5" fill="#2ECC71"/>
    <circle cx="165" cy="115" r="2" fill="#00A86B"/>
    <path d="M36,88 L38,84 L40,88 L38,92 Z" fill="#2ECC71" opacity="0.6"/>
  </g>
</svg>